<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大樂透 6/49 · 開獎模擬器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --red:    #E31B23;
  --red2:   #FF3D45;
  --gold:   #FFB800;
  --gold2:  #FFD94A;
  --dark:   #0A0A0F;
  --dark2:  #12121A;
  --dark3:  #1E1E2E;
  --panel:  #16161F;
  --border: rgba(255,255,255,0.07);
  --white:  #FFFFFF;
  --gray1:  #F0F0F5;
  --gray2:  #A0A0B0;
  --gray3:  #4A4A5A;
  --green:  #00C853;
  --blue:   #2979FF;
  --cyan:   #00E5FF;

  /* 正常號：藍色系 */
  --ball-main-a: #60b4ff;
  --ball-main-b: #1a6fd4;
  /* 特別號：金橘色 */
  --ball-spec-a: #ffdb6a;
  --ball-spec-b: #e07800;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--dark);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── 背景噪訊 ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events: none;
}

.bg-glow {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 10%, rgba(227,27,35,0.13) 0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 88% 82%, rgba(255,184,0,0.11) 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 55% 50%, rgba(41,121,255,0.08) 0%, transparent 50%);
  pointer-events: none;
}

.grid-lines {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
  background-size: 56px 56px;
  pointer-events: none;
}

/* ── 版面 ── */
.app {
  position: relative; z-index: 1;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 16px 100px;
  animation: appIn 0.55s ease both;
}
@keyframes appIn { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

/* ── 頂部列 ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 0 0; margin-bottom: 28px;
}
.logo-wrap { display: flex; align-items: baseline; gap: 10px; }
.logo-main {
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 900; font-size: 32px;
  color: var(--white); letter-spacing: 2px; line-height: 1;
}
.logo-main span { color: var(--red); }
.logo-sub {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 3px; color: var(--gray3);
}
.topbar-right { display: flex; align-items: center; gap: 10px; }

.round-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 2px;
  color: var(--gray3); background: var(--panel);
  border: 1px solid var(--border); padding: 6px 14px; border-radius: 100px;
}

.music-btn {
  width: 42px; height: 42px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--panel);
  color: var(--gray2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.music-btn:hover { border-color: var(--gold); color: var(--gold); transform: scale(1.08); }
.music-btn.on { border-color: var(--gold); color: var(--gold); background: rgba(255,184,0,0.1); }

.music-bars { display: flex; align-items: flex-end; gap: 2px; height: 14px; }
.mb { width: 3px; border-radius: 2px; background: var(--gold); animation: mbBeat 0.7s ease-in-out infinite alternate; }
.mb:nth-child(1){animation-duration:.55s;animation-delay:0s}
.mb:nth-child(2){animation-duration:.75s;animation-delay:.1s}
.mb:nth-child(3){animation-duration:.48s;animation-delay:.2s}
.mb:nth-child(4){animation-duration:.65s;animation-delay:.05s}
@keyframes mbBeat { from{height:3px} to{height:14px} }

.divider { height: 1px; background: linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent); margin-bottom: 24px; }

/* ── 卡片基底 ── */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 26px;
  margin-bottom: 18px;
  position: relative; overflow: hidden;
  animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
.card:nth-child(1){animation-delay:.05s}
.card:nth-child(2){animation-delay:.12s}
.card:nth-child(3){animation-delay:.19s}
.card:nth-child(4){animation-delay:.26s}
@keyframes cardIn { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }

.card-stripe {
  position: absolute; top:0; left:0; right:0; height:3px;
}

.card-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px;
}
.card-title {
  font-weight: 700; font-size: 12px; letter-spacing: 2.5px;
  color: var(--gray2); text-transform: uppercase;
}
.card-badge {
  font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 2px;
  padding: 4px 12px; border-radius: 100px; border: 1px solid;
}

/* ── 추첨기 (轉球機) ── */
.drum-layout {
  display: flex; align-items: center; gap: 28px; margin-bottom: 26px;
}

.drum-box {
  width: 148px; height: 168px; flex-shrink: 0;
  background: var(--dark2); border: 1px solid var(--border); border-radius: 18px;
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  position: relative;
}
.drum-box::before,.drum-box::after {
  content:''; position:absolute; left:0; right:0; height:44px; z-index:2; pointer-events:none;
}
.drum-box::before { top:0; background:linear-gradient(to bottom,var(--dark2),transparent); }
.drum-box::after  { bottom:0; background:linear-gradient(to top,var(--dark2),transparent); }

.drum-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 108px; line-height: 1; color: rgba(255,255,255,0.09);
  position: relative; z-index:1; user-select:none; transition: color 0.1s;
}
.drum-num.lit  { color: var(--white); }
.drum-num.spin { animation: dSpin 0.07s linear; }
@keyframes dSpin {
  0%   { transform: translateY(-28px) scaleY(0.5); opacity:0.3; }
  55%  { transform: translateY(8px) scaleY(1.06); }
  100% { transform: translateY(0) scaleY(1); opacity:1; }
}
.drum-num.land { animation: dLand 0.48s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes dLand {
  0%  { transform: scale(0.45) rotate(-10deg); opacity:0; filter:brightness(3); }
  55% { transform: scale(1.18) rotate(2deg); filter:brightness(1.4); }
  80% { transform: scale(0.96) rotate(-1deg); }
  100%{ transform: scale(1) rotate(0); opacity:1; filter:brightness(1); }
}
.drum-num.spec-land {
  animation: dSpec 0.6s cubic-bezier(0.34,1.56,0.64,1);
  color: var(--gold2) !important;
}
@keyframes dSpec {
  0%  { transform: scale(0) rotate(-25deg); opacity:0; filter:brightness(4); }
  55% { transform: scale(1.28) rotate(4deg); filter:brightness(2); }
  100%{ transform: scale(1) rotate(0); opacity:1; filter:brightness(1); }
}

.drum-info { flex:1; display:flex; flex-direction:column; gap:14px; }

.drum-counter {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 60px; line-height:1; letter-spacing:2px;
  color: rgba(255,255,255,0.07);
  transition: color 0.3s;
}
.drum-counter.lit { color: rgba(255,255,255,0.3); }

.drum-status { font-size:13px; color:var(--gray2); font-weight:500; line-height:1.6; }
.drum-status b { color:var(--white); }

/* 進度格 */
.prog-row { display:flex; gap:7px; }
.prog-slot {
  flex:1; height:5px; border-radius:100px;
  background: rgba(255,255,255,0.05);
  transition: background 0.3s, box-shadow 0.3s;
}
.prog-slot.main-on { background: var(--ball-main-b); box-shadow:0 0 8px rgba(26,111,212,0.6); }
.prog-slot.spec-on { background: var(--gold); box-shadow:0 0 10px rgba(255,184,0,0.7); }

/* ── 按鈕 ── */
.ctrl-row { display:flex; gap:10px; flex-wrap:wrap; }

.btn {
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 700; font-size: 14px; letter-spacing: 0.5px;
  border:none; border-radius:10px; cursor:pointer;
  display:inline-flex; align-items:center; gap:8px; padding:12px 22px;
  position:relative; overflow:hidden;
  transition: transform 0.14s, box-shadow 0.14s, opacity 0.14s;
  -webkit-tap-highlight-color: transparent;
}
.btn::after {
  content:''; position:absolute; inset:0;
  background:rgba(255,255,255,0); transition:background 0.14s;
}
.btn:hover::after { background:rgba(255,255,255,0.07); }
.btn:active { transform:scale(0.96) !important; }

.btn-draw {
  background: var(--red); color:white;
  box-shadow: 0 4px 20px rgba(227,27,35,0.4), inset 0 1px 0 rgba(255,255,255,0.18);
}
.btn-draw:hover { box-shadow:0 6px 28px rgba(227,27,35,0.55), inset 0 1px 0 rgba(255,255,255,0.18); }
.btn-draw:disabled { opacity:0.35; cursor:not-allowed; transform:none; }

.btn-auto {
  background:var(--dark3); color:var(--gray1);
  border:1.5px solid var(--border);
}
.btn-auto:hover { border-color:rgba(255,255,255,0.2); color:white; }
.btn-auto.is-auto { background:rgba(227,27,35,0.15); border-color:var(--red); color:var(--red2); }

.btn-ghost {
  background:transparent; color:var(--gray3); border:1.5px solid var(--border);
}
.btn-ghost:hover { color:var(--gray2); border-color:rgba(255,255,255,0.15); }

.btn-check {
  background:linear-gradient(135deg,var(--green),#00a84d); color:#002a10;
  box-shadow:0 4px 20px rgba(0,200,83,0.35);
}
.btn-check:hover { box-shadow:0 6px 28px rgba(0,200,83,0.5); }
.btn-check:disabled { opacity:0.35; cursor:not-allowed; }

.btn-auto-pick {
  background:var(--dark3); color:var(--gray1); border:1.5px solid var(--border);
}
.btn-auto-pick:hover { border-color:rgba(255,255,255,0.2); color:white; }

.btn-icon { width:15px; height:15px; flex-shrink:0; }
.spacer { flex:1; }

/* 漣漪 */
.ripple {
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,0.22);
  transform:scale(0); animation:ripAnim 0.5s linear;
  pointer-events:none;
}
@keyframes ripAnim { to { transform:scale(4); opacity:0; } }

/* ── 已開號碼列 ── */
.balls-row {
  display:flex; flex-wrap:wrap; gap:10px; min-height:58px; align-items:center;
}
.balls-empty { font-size:13px; color:var(--gray3); font-style:italic; font-weight:300; }

/* ── 球 ── */
.ball {
  width: 54px; height: 54px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 22px;
  flex-shrink: 0; position: relative; cursor: default;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  font-weight: 400;
}
.ball:hover { transform: translateY(-6px) scale(1.12); z-index:2; }

/* 正常號 — 藍色 */
.ball-main {
  background: radial-gradient(ellipse at 35% 28%, #7ecbff, #1a6fd4);
  color: white;
  box-shadow: 0 5px 16px rgba(26,111,212,0.5), inset 0 1.5px 0 rgba(255,255,255,0.35);
}
/* 特別號 — 金橘色 */
.ball-spec {
  background: radial-gradient(ellipse at 35% 28%, #ffe07a, #e07800);
  color: #3a2000;
  box-shadow: 0 5px 16px rgba(224,120,0,0.5), inset 0 1.5px 0 rgba(255,255,255,0.4);
}

.ball.new-in { animation: ballIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes ballIn {
  0%  { transform:scale(0) translateY(-24px) rotate(-18deg); opacity:0; }
  60% { transform:scale(1.2) translateY(2px) rotate(3deg); }
  100%{ transform:scale(1) translateY(0) rotate(0); opacity:1; }
}

/* 特別號光環 */
.spec-ring {
  position:absolute; inset:-5px; border-radius:50%;
  border:2px solid var(--gold); opacity:0.75;
  animation:ringPulse 2s ease-in-out infinite;
}
@keyframes ringPulse {
  0%,100%{ opacity:0.75; transform:scale(1); }
  50%    { opacity:0.25; transform:scale(1.18); }
}

/* ── 號碼格 ── */
.num-grid {
  display:grid; grid-template-columns:repeat(7,1fr); gap:6px;
}
.ng {
  aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue',sans-serif; font-size:13px;
  border-radius:10px; color:var(--gray3);
  background:rgba(255,255,255,0.03); border:1px solid var(--border);
  transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.ng:hover:not(.ng-main):not(.ng-spec) {
  border-color:rgba(255,255,255,0.15); color:var(--gray2); transform:scale(1.15); z-index:2;
}
.ng.ng-main {
  background: radial-gradient(ellipse at 35% 28%, #7ecbff, #1a6fd4);
  color:white; border-color:transparent;
  transform:scale(1.06);
  box-shadow:0 3px 10px rgba(26,111,212,0.45);
}
.ng.ng-spec {
  background: radial-gradient(ellipse at 35% 28%, #ffe07a, #e07800);
  color:#3a2000; border-color:transparent;
  transform:scale(1.1);
  box-shadow:0 0 14px rgba(224,120,0,0.55);
}

/* ── 玩家選號 ── */
.pick-card {
  background:var(--dark2); border:1px solid rgba(255,255,255,0.07);
  border-radius:16px; padding:22px; margin-bottom:20px;
}
.pick-top {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;
}
.pick-brand { display:flex; align-items:center; gap:8px; }
.pick-brand-dot {
  width:10px; height:10px; border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--red));
}
.pick-brand-txt { font-weight:700; font-size:14px; color:var(--gray2); letter-spacing:1px; }
.pick-round-txt { font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:2px; color:var(--gray3); }

/* 選號點進度 */
.pick-prog { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.pick-dots { display:flex; gap:7px; }
.pdot {
  width:26px; height:5px; border-radius:100px;
  background:rgba(255,255,255,0.07); transition:all 0.25s;
}
.pdot.on { background:var(--gold); box-shadow:0 0 8px rgba(255,184,0,0.5); }
.pick-hint { font-size:11px; color:var(--gray3); font-weight:500; }

/* 選號格 */
.pick-grid {
  display:grid; grid-template-columns:repeat(7,1fr); gap:6px;
}
.pn {
  aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue',sans-serif; font-size:14px; border-radius:50%;
  cursor:pointer; user-select:none;
  color:var(--gray3); background:rgba(255,255,255,0.04); border:1.5px solid rgba(255,255,255,0.06);
  transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);
  -webkit-tap-highlight-color:transparent;
}
.pn:hover {
  color:white; border-color:rgba(255,255,255,0.25); transform:scale(1.12); z-index:2;
  background:rgba(255,255,255,0.09);
}
.pn.sel {
  background:radial-gradient(ellipse at 35% 28%, #7ecbff, #1a6fd4);
  color:white; border-color:transparent;
  box-shadow:0 3px 12px rgba(26,111,212,0.5); transform:scale(1.1);
  animation:pickBounce 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes pickBounce { 0%{transform:scale(0.8)} 65%{transform:scale(1.22)} 100%{transform:scale(1.1)} }

/* 對獎標記 */
.pn.hit-main  { outline:2.5px solid var(--green); outline-offset:2px; }
.pn.hit-spec  { outline:2.5px solid var(--gold);  outline-offset:2px; }
.pn.miss      { opacity:0.3; }

/* ── 對獎結果 ── */
.result-panel {
  border-radius:16px; padding:20px 22px; margin-top:20px;
  display:none; position:relative; overflow:hidden;
}
.result-panel.show { display:block; animation:resIn 0.45s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes resIn { from{transform:translateY(14px) scale(0.97);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }

.r-none    { background:rgba(255,255,255,0.03); border:1px solid var(--border); }
.r-low     { background:rgba(0,200,83,0.07);    border:1px solid rgba(0,200,83,0.22); }
.r-mid     { background:rgba(41,121,255,0.08);  border:1px solid rgba(41,121,255,0.3); }
.r-high    { background:rgba(255,184,0,0.09);   border:1px solid rgba(255,184,0,0.38); }
.r-jackpot { background:rgba(227,27,35,0.1);    border:1px solid rgba(227,27,35,0.42);
             animation:jackpotPulse 1s ease-in-out infinite alternate; }
@keyframes jackpotPulse {
  from { box-shadow:0 0 0 rgba(227,27,35,0); }
  to   { box-shadow:0 0 32px rgba(227,27,35,0.28); }
}

.res-inner { display:flex; align-items:center; gap:16px; margin-bottom:14px; }

.res-badge {
  width:62px; height:62px; border-radius:14px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0;
}
.res-badge-num   { font-family:'Bebas Neue',sans-serif; font-size:32px; line-height:1; }
.res-badge-label { font-size:9px; font-weight:700; letter-spacing:1px; margin-top:1px; }

.r-none    .res-badge { background:rgba(255,255,255,0.05);  color:var(--gray3); }
.r-low     .res-badge { background:rgba(0,200,83,0.15);     color:var(--green); animation:badgePop .5s cubic-bezier(0.34,1.56,0.64,1); }
.r-mid     .res-badge { background:rgba(41,121,255,0.18);   color:#60aaff;      animation:badgePop .5s cubic-bezier(0.34,1.56,0.64,1); }
.r-high    .res-badge { background:rgba(255,184,0,0.18);    color:var(--gold2); animation:badgePop .5s cubic-bezier(0.34,1.56,0.64,1); }
.r-jackpot .res-badge { background:rgba(227,27,35,0.2);     color:var(--red2);  animation:badgeSpin .6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes badgePop  { from{transform:scale(0)} to{transform:scale(1)} }
@keyframes badgeSpin { from{transform:scale(0) rotate(-180deg)} to{transform:scale(1) rotate(0)} }

.res-title { font-weight:900; font-size:20px; color:var(--white); margin-bottom:4px; }
.res-sub   { font-size:12px; color:var(--gray2); font-weight:500; }

.chip-row { display:flex; flex-wrap:wrap; gap:6px; }
.chip {
  padding:5px 13px; border-radius:100px;
  font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:1px;
  display:inline-flex; align-items:center; gap:4px;
  animation:chipPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}
.chip:nth-child(1){animation-delay:.00s} .chip:nth-child(2){animation-delay:.05s}
.chip:nth-child(3){animation-delay:.10s} .chip:nth-child(4){animation-delay:.15s}
.chip:nth-child(5){animation-delay:.20s} .chip:nth-child(6){animation-delay:.25s}
@keyframes chipPop { from{transform:scale(0.7) translateY(6px);opacity:0} to{transform:scale(1);opacity:1} }
.chip-hit  { background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.15); }
.chip-spec { background:rgba(255,184,0,0.18); color:var(--gold2); border:1px solid rgba(255,184,0,0.3); }
.chip-miss { background:rgba(255,255,255,0.04); color:var(--gray3); border:1px solid var(--border); }

/* ── 圖例 ── */
.legend { display:flex; gap:12px; flex-wrap:wrap; }
.leg-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--gray3); font-weight:500; }
.leg-dot  { width:9px; height:9px; border-radius:50%; }

/* ── 閃光層 ── */
#flashLayer {
  position:fixed; inset:0; z-index:990; pointer-events:none; opacity:0;
}
#flashLayer.fwhite { animation:fWhite .4s ease forwards; }
#flashLayer.fgold  { animation:fGold  .5s ease forwards; }
@keyframes fWhite { 0%{opacity:.35;background:rgba(255,255,255,0.35)} 100%{opacity:0} }
@keyframes fGold  { 0%{opacity:.4;background:radial-gradient(ellipse at center,rgba(255,184,0,0.5),transparent 65%)} 100%{opacity:0} }

/* ── 彩帶 ── */
#confetti { position:fixed; inset:0; pointer-events:none; z-index:999; opacity:0; transition:opacity .2s; }
#confetti.show { opacity:1; }

/* ── RWD ── */
@media(max-width:540px){
  .drum-layout { flex-direction:column; gap:14px; }
  .drum-box { width:120px; height:140px; }
  .drum-num { font-size:86px; }
  .pick-grid,.num-grid { grid-template-columns:repeat(7,1fr); gap:4px; }
  .card { padding:18px 14px; }
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="grid-lines"></div>
<div id="flashLayer"></div>
<canvas id="confetti"></canvas>

<div class="app">

  <!-- 頂部 -->
  <div class="topbar">
    <div class="logo-wrap">

    </div>

      <div class="drum-info">

        <div class="drum-status" id="drumStatus">按下「開獎」開始抽取號碼<br>共抽 <b>6 個正常號</b> ＋ <b>1 個特別號</b></div>
        <div class="prog-row" id="progRow">

          <div class="prog-slot" id="ps4"></div>
          <div class="prog-slot" id="ps5"></div>
          <div class="prog-slot" id="ps6"></div>
          <div class="prog-slot" id="ps7"></div>
        </div>
      </div>
    </div>

    <div class="ctrl-row">
      <button class="btn btn-draw" id="drawBtn" onclick="doDraw()">
        <svg class="btn-icon" viewBox="0 0 16 16" fill="none"><path d="M8 2l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        開獎
      </button>
      <button class="btn btn-auto" id="autoBtn" onclick="toggleAuto()">
        <svg class="btn-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M6 5.5l5 2.5-5 2.5Z" fill="currentColor"/></svg>
        自動開獎
      </button>
      <div class="spacer"></div>
      <button class="btn btn-ghost" onclick="resetAll()">
        <svg class="btn-icon" viewBox="0 0 16 16" fill="none"><path d="M2.5 8a5.5 5.5 0 1 1 1.1 3.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2.5 11.5V8h3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        重置
      </button>
    </div>
  </div>

  <!-- 已開號碼 -->
  <div class="card">
    <div class="card-stripe" style="background:linear-gradient(90deg,var(--ball-main-b),#60b4ff,var(--gold))"></div>
    <div class="card-header">
      <div class="card-title">當期號碼 · WINNING NUMBERS</div>
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:radial-gradient(#7ecbff,#1a6fd4)"></div>正常號</div>
        <div class="leg-item"><div class="leg-dot" style="background:radial-gradient(#ffe07a,#e07800)"></div>特別號</div>
      </div>
    </div>
    <div class="balls-row" id="ballsRow">
      <div class="balls-empty">尚未開獎 ···</div>
    </div>
  </div>

  <!-- 號碼總覽 -->
  <div class="card">
    <div class="card-stripe" style="background:linear-gradient(90deg,var(--blue),var(--cyan),#aa00ff)"></div>
    <div class="card-header">
      <div class="card-title">號碼總覽 1–49 · NUMBER BOARD</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:var(--gray3)">
        已開 <span id="drawnCnt">0</span> / 7
      </div>

    <div class="num-grid" id="numGrid"></div>
  </div>

  <!-- 選號 / 對獎 -->
  <div class="card">
    <div class="card-stripe" style="background:linear-gradient(90deg,var(--green),#00e5ff,var(--green))"></div>
    <div class="card-header">
      <div class="card-title">我的號碼 · MY TICKET</div>
      <div style="font-size:12px;color:var(--gray3)">選擇 6 個號碼（1–49）</div>
    </div>

    <div class="pick-card">
      <div class="pick-top">
        <div class="pick-brand">
          <div class="pick-brand-dot"></div>
          <div class="pick-brand-txt">台灣彩券</div>
        </div>
        <div class="pick-round-txt" id="pickRound">第 — 期 ▪ 甲組</div>
      </div>

      <div class="pick-prog">
        <div class="pick-dots">
          <div class="pdot" id="pd1"></div><div class="pdot" id="pd2"></div>
          <div class="pdot" id="pd3"></div><div class="pdot" id="pd4"></div>
          <div class="pdot" id="pd5"></div><div class="pdot" id="pd6"></div>
        </div>

    <div class="ctrl-row" style="margin-bottom:0">

        <svg class="btn-icon" viewBox="0 0 16 16" fill="none"><path d="M3 8l3.5 3.5L13 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>

        隨機選號

    <div class="result-panel" id="resultPanel">

          <div class="res-badge-num"   id="resBadgeNum">0</div>
          <div class="res-badge-label" id="resBadgeLbl">個相符</div>
        </div>
        <div>
          <div class="res-title" id="resTitle">—</div>
          <div class="res-sub"   id="resSub">—</div>
        </div>
      </div>
      <div class="chip-row" id="chipRow"></div>
    </div>
  </div>

</div><!-- .app -->

<script>
// ══════════════════════════════════════════════
//  音效 & 音樂引擎
// ══════════════════════════════════════════════
let AC = null, musicOn = false;
let bgmGain = null, bgmTimer = null, bgmNodes = [];

function ac() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  return AC;
}

function tone(freq, type, dur, vol, delay, dest) {
  const c = ac();
  dest = dest || c.destination;
  const o = c.createOscillator(), g = c.createGain();
  o.connect(g); g.connect(dest);
  o.type = type; o.frequency.value = freq;
  const t = c.currentTime + (delay || 0);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol || 0.2, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.05);
}

// 打擊音
function sfxTick(i) {
  const c = ac();
  const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.04), c.sampleRate);
  const d = buf.getChannelData(0);
  for (let j = 0; j < d.length; j++) d[j] = (Math.random()*2-1)*(1-j/d.length);
  const s = c.createBufferSource(); s.buffer = buf;
  const g = c.createGain(); g.gain.value = 0.1;
  const bp = c.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = 1000 + i*35; bp.Q.value = 2;
  s.connect(bp); bp.connect(g); g.connect(c.destination);
  s.start(); s.stop(c.currentTime + 0.04);
  tone(220 + i*14, 'sine', 0.07, 0.12);
}

// 開球音
function sfxDraw(n) {
  const b = 300 + (n % 10) * 40;
  tone(b,       'sine',     0.3, 0.2);
  tone(b * 1.5, 'sine',     0.2, 0.07, 0.05);
  tone(b * 2,   'triangle', 0.12, 0.04, 0.1);
}

// 特別號音
function sfxSpecial() {
  [440, 554, 659, 880, 1109].forEach((f, i) => {
    tone(f,       'sine',     0.6,  0.2,  i * 0.09);
    tone(f * 1.5, 'triangle', 0.3,  0.05, i * 0.09 + 0.02);
  });
  tone(110, 'sawtooth', 0.5, 0.08);
}

// 頭獎
function sfxFanfare() {
  [523, 659, 784, 1047, 784, 1047, 1319, 1047, 1568].forEach((f, i) => {
    tone(f,      'sine',  0.55, 0.22, i * 0.1);
    tone(f * .5, 'sine',  0.8,  0.1,  i * 0.1);
  });
  [0, .3, .6].forEach(d => tone(80, 'sine', 0.4, 0.25, d));
}

// 普通音效
function sfxClick()  { tone(700, 'sine', 0.06, 0.1); }
function sfxSelect() { tone(600 + Math.random()*350, 'sine', 0.1, 0.14); tone(900 + Math.random()*400, 'triangle', 0.06, 0.06, 0.04); }
function sfxDesel()  { tone(320, 'sine', 0.08, 0.1); }
function sfxBloop()  { tone(240, 'sine', 0.38, 0.18); tone(190, 'sine', 0.28, 0.12, 0.1); }
function sfxWin()    { [523, 659, 784].forEach((f, i) => tone(f, 'sine', 0.5, 0.2, i*0.12)); }

// ── BGM：K-pop 電子節拍 ──────────────────────────
function startBGM() {
  if (!musicOn || bgmGain) return;
  const c = ac();
  bgmGain = c.createGain(); bgmGain.gain.value = 0.17;
  bgmGain.connect(c.destination);

  const BPM = 128, beat = 60 / BPM;
  // 和弦進行 Am - F - C - G
  const chords = [
    [[220, 261.63, 329.63], 220 * .5],
    [[174.61, 220, 261.63], 174.61 * .5],
    [[130.81, 164.81, 196],  130.81 * .5],
    [[196,    246.94, 293.66], 196 * .5],
  ];
  let ci = 0;
  let t = c.currentTime + 0.08;

  function schedChord() {
    if (!musicOn) return;
    const [ch, bass] = chords[ci % chords.length];

    // 和弦
    ch.forEach(f => {
      const o = c.createOscillator(), g2 = c.createGain();
      const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 780;
      o.type = 'sawtooth'; o.frequency.value = f;
      o.connect(lp); lp.connect(g2); g2.connect(bgmGain);
      g2.gain.setValueAtTime(0, t);
      g2.gain.linearRampToValueAtTime(0.075, t + .05);
      g2.gain.setValueAtTime(0.075, t + beat*4 - .05);
      g2.gain.linearRampToValueAtTime(0, t + beat*4);
      o.start(t); o.stop(t + beat*4 + .05);
      bgmNodes.push(o);
    });

    // 貝斯
    const bo = c.createOscillator(), bg2 = c.createGain();
    bo.type = 'sine'; bo.frequency.value = bass;
    bo.connect(bg2); bg2.connect(bgmGain);
    bg2.gain.setValueAtTime(0, t);
    bg2.gain.linearRampToValueAtTime(0.28, t + .03);
    bg2.gain.setValueAtTime(0.28, t + beat*2);
    bg2.gain.linearRampToValueAtTime(0, t + beat*4);
    bo.start(t); bo.stop(t + beat*4 + .05);
    bgmNodes.push(bo);

    // Hi-hat（8分音符）
    for (let i = 0; i < 8; i++) {
      const hbuf = c.createBuffer(1, Math.floor(c.sampleRate * .035), c.sampleRate);
      const hd = hbuf.getChannelData(0);
      for (let j = 0; j < hd.length; j++) hd[j] = (Math.random()*2-1)*(1-j/hd.length);
      const hs = c.createBufferSource(); hs.buffer = hbuf;
      const hg = c.createGain(); hg.gain.value = i%2===0 ? .05 : .022;
      const hhp = c.createBiquadFilter(); hhp.type = 'highpass'; hhp.frequency.value = 7500;
      hs.connect(hhp); hhp.connect(hg); hg.connect(bgmGain);
      hs.start(t + i * beat * .5);
      bgmNodes.push(hs);
    }

    // Kick（第 1、3 拍）
    [0, beat*2].forEach(off => {
      const ko = c.createOscillator(), kg = c.createGain();
      ko.type = 'sine';
      ko.frequency.setValueAtTime(200, t + off);
      ko.frequency.exponentialRampToValueAtTime(38, t + off + .16);
      ko.connect(kg); kg.connect(bgmGain);
      kg.gain.setValueAtTime(.55, t + off);
      kg.gain.exponentialRampToValueAtTime(.0001, t + off + .22);
      ko.start(t + off); ko.stop(t + off + .25);
      bgmNodes.push(ko);
    });

    // Snare（第 2、4 拍）
    [beat, beat*3].forEach(off => {
      const sbuf = c.createBuffer(1, Math.floor(c.sampleRate * .1), c.sampleRate);
      const sd = sbuf.getChannelData(0);
      for (let j = 0; j < sd.length; j++) sd[j] = (Math.random()*2-1)*(1-j/sd.length)*.85;
      const ss = c.createBufferSource(); ss.buffer = sbuf;
      const sg = c.createGain(); sg.gain.value = .2;
      const sbp = c.createBiquadFilter(); sbp.type = 'bandpass'; sbp.frequency.value = 2200;
      ss.connect(sbp); sbp.connect(sg); sg.connect(bgmGain);
      ss.start(t + off);
      bgmNodes.push(ss);
    });

    // 律動合成音（帶感情）
    if (ci % 2 === 0) {
      const mo = c.createOscillator(), mg = c.createGain();
      mo.type = 'triangle'; mo.frequency.value = ch[1] * 2;
      mo.connect(mg); mg.connect(bgmGain);
      mg.gain.setValueAtTime(0, t + beat);
      mg.gain.linearRampToValueAtTime(0.04, t + beat + .06);
      mg.gain.exponentialRampToValueAtTime(.0001, t + beat * 2);
      mo.start(t + beat); mo.stop(t + beat * 2);
      bgmNodes.push(mo);
    }

    t += beat * 4;
    ci++;
    if (bgmNodes.length > 300) bgmNodes = bgmNodes.slice(-120);
  }

  schedChord();
  bgmTimer = setInterval(() => {
    if (!musicOn) { clearInterval(bgmTimer); return; }
    if (t < ac().currentTime + beat * 5) schedChord();
  }, beat * 1800);
}

function stopBGM() {
  clearInterval(bgmTimer); bgmTimer = null;
  if (bgmGain) {
    try { bgmGain.gain.exponentialRampToValueAtTime(.0001, ac().currentTime + .35); } catch(e){}
  }
  bgmNodes.forEach(n => { try { n.stop(ac().currentTime + .4); } catch(e){} });
  bgmNodes = []; bgmGain = null;
}

function toggleMusic() {
  musicOn = !musicOn;
  const btn = document.getElementById('musicBtn');
  if (musicOn) {
    btn.classList.add('on');
    btn.innerHTML = `<div class="music-bars"><div class="mb"></div><div class="mb"></div><div class="mb"></div><div class="mb"></div></div>`;
    startBGM();
  } else {
    btn.classList.remove('on');
    btn.innerHTML = '♪';
    stopBGM();
  }
}

// ══════════════════════════════════════════════
//  遊戲狀態
// ══════════════════════════════════════════════
const TOTAL = 49, MAIN = 6;
let pool = [], mainDrawn = [], specNum = null;
let autoTimer = null, isSpinning = false, spinIv = null;
let roundNo = Math.floor(Math.random() * 900 + 1000);
let picks = new Set();

function shuffle(a) {
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ── 建立格子 ─────────────────────────────────
function buildNumGrid() {
  const g = document.getElementById('numGrid'); g.innerHTML = '';
  for (let i = 1; i <= TOTAL; i++) {
    const el = document.createElement('div');
    el.className = 'ng'; el.id = 'ng'+i; el.textContent = i;
    g.appendChild(el);
  }
}

function buildPickGrid() {
  const g = document.getElementById('pickGrid'); g.innerHTML = '';
  for (let i = 1; i <= TOTAL; i++) {
    const el = document.createElement('div');
    el.className = 'pn'; el.id = 'pk'+i; el.textContent = i;
    el.onclick = () => togglePick(i);
    g.appendChild(el);
  }
}

// ── 選號 ────────────────────────────────────
function togglePick(n) {
  if (picks.has(n)) {
    sfxDesel();
    picks.delete(n);
    document.getElementById('pk'+n).classList.remove('sel');
  } else {
    if (picks.size >= 6) return;
    sfxSelect();
    picks.add(n);
    document.getElementById('pk'+n).classList.add('sel');
  }
  refreshPickUI();
}

function refreshPickUI() {
  const cnt = picks.size;
  for (let i = 1; i <= 6; i++) document.getElementById('pd'+i).classList.toggle('on', i <= cnt);
  document.getElementById('pickHint').textContent = `${cnt} / 6 已選`;
  const drawn = mainDrawn.length + (specNum !== null ? 1 : 0);
  document.getElementById('checkBtn').disabled = cnt < 6 || drawn < 7;
  const rp = document.getElementById('resultPanel');
  if (rp.classList.contains('show')) { rp.classList.remove('show'); clearPickMarks(); }
}

function clearPickMarks() {
  document.querySelectorAll('.pn').forEach(el => el.classList.remove('hit-main','hit-spec','miss'));
}

function autoPickNums() {
  sfxClick(); clearPicks();
  const all = shuffle([...Array(TOTAL)].map((_,i)=>i+1));
  all.slice(0,6).forEach(n => { picks.add(n); document.getElementById('pk'+n).classList.add('sel'); });
  refreshPickUI();
}

function clearPicks() {
  picks.forEach(n => document.getElementById('pk'+n).classList.remove('sel'));
  picks.clear(); clearPickMarks(); refreshPickUI();
  document.getElementById('resultPanel').classList.remove('show');
}

// ── 滾輪動畫 ────────────────────────────────
function spinDrum(target, onDone) {
  clearInterval(spinIv);
  isSpinning = true;
  let ticks = 0;
  const maxTicks = 10 + Math.floor(Math.random() * 9);
  const el = document.getElementById('drumNum');

  spinIv = setInterval(() => {
    const fake = Math.floor(Math.random() * TOTAL) + 1;
    el.textContent = fake < 10 ? '0'+fake : fake;
    el.className = 'drum-num lit spin';
    sfxTick(ticks);
    ticks++;
    if (ticks >= maxTicks) {
      clearInterval(spinIv);
      isSpinning = false;
      el.textContent = target < 10 ? '0'+target : target;
      el.className = 'drum-num lit ' + (onDone === 'spec' ? 'spec-land' : 'land');
      onDone === 'spec' ? sfxSpecial() : sfxDraw(target);
    }
  }, 62);
}

// ── 開獎 ────────────────────────────────────
function doDraw() {
  const drawn = mainDrawn.length + (specNum !== null ? 1 : 0);
  if (drawn >= 7 || isSpinning) return;

  document.getElementById('drawBtn').disabled = true;

  const isSpec = mainDrawn.length === MAIN;
  const num = pool.pop();

  // 閃光
  const fl = document.getElementById('flashLayer');
  fl.className = isSpec ? 'fgold' : 'fwhite';
  setTimeout(() => fl.className = '', 500);

  spinDrum(num, isSpec ? 'spec' : 'main');

  setTimeout(() => {
    isSpec ? (specNum = num) : mainDrawn.push(num);
    addBallToRow(num, isSpec);
    markNumGrid(num, isSpec);
    refreshProgress();
    refreshDrumInfo();

    const totalDrawn = mainDrawn.length + (specNum !== null ? 1 : 0);
    document.getElementById('drawnCnt').textContent = totalDrawn;
    refreshPickUI();

    if (totalDrawn < 7) {
      document.getElementById('drawBtn').disabled = false;
    } else {
      document.getElementById('autoBtn').disabled = true;
    }
  }, 720);
}

function addBallToRow(n, isSpec) {
  const row = document.getElementById('ballsRow');
  const emp = row.querySelector('.balls-empty');
  if (emp) emp.remove();
  row.querySelectorAll('.ball.new-in').forEach(b => b.classList.remove('new-in'));

  const ball = document.createElement('div');
  ball.className = `ball ${isSpec ? 'ball-spec' : 'ball-main'} new-in`;
  ball.textContent = n;
  if (isSpec) {
    const ring = document.createElement('div');
    ring.className = 'spec-ring';
    ball.appendChild(ring);
  }
  row.appendChild(ball);
}

function markNumGrid(n, isSpec) {
  const el = document.getElementById('ng'+n);
  if (el) el.classList.add(isSpec ? 'ng-spec' : 'ng-main');
}

function refreshProgress() {
  const drawn = mainDrawn.length + (specNum !== null ? 1 : 0);
  for (let i = 1; i <= 7; i++) {
    const s = document.getElementById('ps'+i);
    s.classList.remove('main-on','spec-on');
    if (i < drawn + 1) {
      s.classList.add(i === 7 ? 'spec-on' : 'main-on');
    }
  }
}

function refreshDrumInfo() {
  const drawn = mainDrawn.length + (specNum !== null ? 1 : 0);
  const cnt = document.getElementById('drumCounter');
  cnt.textContent = `${drawn}/7`; cnt.classList.add('lit');
  const ph = document.getElementById('drumPhase');
  const st = document.getElementById('drumStatus');

  if (specNum !== null) {
    ph.textContent = '開獎完成';
    ph.style.cssText = 'color:var(--gold2);border-color:rgba(255,184,0,0.35);background:rgba(255,184,0,0.1)';
    st.innerHTML = '<b>全部號碼已開出！</b><br>請對獎確認是否中獎。';
  } else {
    ph.textContent = `第 ${mainDrawn.length} 球`;
    ph.style.cssText = 'color:var(--red2);border-color:rgba(227,27,35,0.3);background:rgba(227,27,35,0.1)';
    st.innerHTML = `正常號 <b>${mainDrawn.length} / 6</b> 已開出`;
  }
}

function toggleAuto() {
  if (autoTimer) {
    clearInterval(autoTimer); autoTimer = null;
    const b = document.getElementById('autoBtn');
    b.classList.remove('is-auto');
    b.innerHTML = `<svg class="btn-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M6 5.5l5 2.5-5 2.5Z" fill="currentColor"/></svg>自動開獎`;
    const drawn = mainDrawn.length + (specNum!==null?1:0);
    document.getElementById('drawBtn').disabled = drawn >= 7;
    return;
  }
  sfxClick();
  const b = document.getElementById('autoBtn');
  b.classList.add('is-auto');
  b.innerHTML = `<svg class="btn-icon" viewBox="0 0 16 16" fill="none"><rect x="4" y="3" width="3" height="10" rx="1" fill="currentColor"/><rect x="9" y="3" width="3" height="10" rx="1" fill="currentColor"/></svg>暫停`;
  document.getElementById('drawBtn').disabled = true;
  autoTimer = setInterval(() => {
    const drawn = mainDrawn.length + (specNum !== null ? 1 : 0);
    if (drawn >= 7 || isSpinning) { clearInterval(autoTimer); autoTimer = null; return; }
    doDraw();
  }, 1700);
}

function resetAll() {
  sfxClick();
  clearInterval(autoTimer); autoTimer = null; clearInterval(spinIv); isSpinning = false;
  pool = shuffle([...Array(TOTAL)].map((_,i)=>i+1));
  mainDrawn = []; specNum = null; roundNo++;

  document.getElementById('drumNum').textContent = '—';
  document.getElementById('drumNum').className = 'drum-num';
  document.getElementById('drumCounter').textContent = '0/7';
  document.getElementById('drumCounter').classList.remove('lit');
  document.getElementById('drumStatus').innerHTML = '按下「開獎」開始抽取號碼<br>共抽 <b>6 個正常號</b> ＋ <b>1 個特別號</b>';
  document.getElementById('drumPhase').textContent = '等待開獎';
  document.getElementById('drumPhase').style.cssText = 'color:var(--gray3);border-color:var(--border)';
  document.getElementById('drawBtn').disabled = false;
  document.getElementById('autoBtn').disabled = false;
  document.getElementById('autoBtn').classList.remove('is-auto');
  document.getElementById('autoBtn').innerHTML = `<svg class="btn-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M6 5.5l5 2.5-5 2.5Z" fill="currentColor"/></svg>自動開獎`;
  document.getElementById('ballsRow').innerHTML = '<div class="balls-empty">尚未開獎 ···</div>';
  document.getElementById('drawnCnt').textContent = '0';
  document.getElementById('roundBadge').textContent = `第 ${roundNo} 期`;
  document.getElementById('pickRound').textContent = `第 ${roundNo} 期 ▪ 甲組`;

  for (let i = 1; i <= 7; i++) {
    const s = document.getElementById('ps'+i);
    s.classList.remove('main-on','spec-on');
  }
  buildNumGrid(); clearPicks();
}

// ── 對獎 ────────────────────────────────────
function checkTicket() {
  if (picks.size < 6) return;
  sfxClick();
  clearPickMarks();

  // 清除 numGrid 外框
  for (let i = 1; i <= TOTAL; i++) {
    const el = document.getElementById('ng'+i);
    if (el) { el.style.outline=''; el.style.outlineOffset=''; }
  }

  const mainSet = new Set(mainDrawn);
  let hitMain = 0, hitSpec = false;
  const details = [];

  picks.forEach(n => {
    const el = document.getElementById('pk'+n);
    if (mainSet.has(n)) {
      hitMain++;
      el.classList.add('hit-main');
      details.push({n, type:'main'});
    } else if (n === specNum) {
      hitSpec = true;
      el.classList.add('hit-spec');
      details.push({n, type:'spec'});
    } else {
      el.classList.add('miss');
      details.push({n, type:'miss'});
    }
  });

  // 獎項判定
  let rank, title, sub, panelCls;
  if (hitMain === 6) {
    rank='1'; title='🏆 頭獎！6 個全中！'; sub='恭喜！全台最高獎金等你拿！'; panelCls='r-jackpot';
    setTimeout(() => { sfxFanfare(); startConfetti(); setTimeout(stopConfetti,7000); }, 350);
  } else if (hitMain === 5 && hitSpec) {
    rank='2'; title='🎉 二獎！5＋特別號'; sub='5 個正常號全中 ＋ 特別號'; panelCls='r-high';
    setTimeout(() => { sfxFanfare(); startConfetti(); setTimeout(stopConfetti,5500); }, 350);
  } else if (hitMain === 5) {
    rank='3'; title='三獎！5 個全中'; sub='5 個正常號完全吻合'; panelCls='r-high';
    setTimeout(() => sfxSpecial(), 250);
  } else if (hitMain === 4 && hitSpec) {
    rank='4'; title='四獎！4＋特別號'; sub='4 個正常號 ＋ 特別號'; panelCls='r-mid';
    setTimeout(() => sfxSpecial(), 250);
  } else if (hitMain === 4) {
    rank='5'; title='五獎！4 個相符'; sub='4 個正常號吻合'; panelCls='r-mid';
    setTimeout(() => sfxWin(), 200);
  } else if (hitMain === 3 && hitSpec) {
    rank='6'; title='六獎！3＋特別號'; sub='3 個正常號 ＋ 特別號'; panelCls='r-low';
    setTimeout(() => sfxWin(), 200);
  } else if (hitMain === 2 && hitSpec) {
    rank='7'; title='普獎！2＋特別號'; sub='2 個正常號 ＋ 特別號 （普獎）'; panelCls='r-low';
    tone(500, 'sine', 0.4, 0.18);
  } else {
    rank='—'; title='未中獎'; sub=`對中 ${hitMain} 個正常號${hitSpec?' ＋ 特別號':''}`; panelCls='r-none';
    sfxBloop();
  }

  const panel = document.getElementById('resultPanel');
  panel.className = `result-panel show ${panelCls}`;
  document.getElementById('resBadgeNum').textContent = hitMain + (hitSpec ? '+特' : '');
  document.getElementById('resBadgeLbl').textContent = '個相符';
  document.getElementById('resTitle').textContent = title;
  document.getElementById('resSub').textContent = sub;

  document.getElementById('chipRow').innerHTML = [...picks].sort((a,b)=>a-b).map((n,i) => {
    const d = details.find(x=>x.n===n);
    if (!d) return '';
    if (d.type==='main') return `<div class="chip chip-hit" style="animation-delay:${i*.05}s">${n} ✓</div>`;
    if (d.type==='spec') return `<div class="chip chip-spec" style="animation-delay:${i*.05}s">${n} ★</div>`;
    return `<div class="chip chip-miss" style="animation-delay:${i*.05}s">${n}</div>`;
  }).join('');

  // 在號碼格上標示
  details.forEach(d => {
    if (d.type==='miss') return;
    const el = document.getElementById('ng'+d.n);
    if (el) {
      el.style.outline = `2.5px solid ${d.type==='main'?'var(--green)':'var(--gold)'}`;
      el.style.outlineOffset = '2px';
    }
  });
}

// ── 彩帶 ────────────────────────────────────
let confAnim = null;
function startConfetti() {
  const cv = document.getElementById('confetti');
  cv.classList.add('show'); cv.width = innerWidth; cv.height = innerHeight;
  const ctx = cv.getContext('2d'), ps = [];
  const cols = ['#E31B23','#FFB800','#2979FF','#00C853','#FF6B6B','#00E5FF','#AA00FF','#FFD94A'];
  for (let i = 0; i < 150; i++) ps.push({
    x: Math.random()*cv.width, y: -20-Math.random()*220,
    w: 8+Math.random()*10, h: 5+Math.random()*9,
    vx: (Math.random()-.5)*4.5, vy: 2.5+Math.random()*4.5,
    rot: Math.random()*360, vr: (Math.random()-.5)*8,
    c: cols[Math.floor(Math.random()*cols.length)],
    circle: Math.random()>.5
  });
  function draw() {
    ctx.clearRect(0,0,cv.width,cv.height);
    let alive = false;
    ps.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.vy+=.06; p.rot+=p.vr;
      if (p.y < cv.height+30) alive = true;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180); ctx.fillStyle=p.c;
      if (p.circle) { ctx.beginPath(); ctx.arc(0,0,p.w/2,0,Math.PI*2); ctx.fill(); }
      else ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    if (alive) confAnim = requestAnimationFrame(draw); else stopConfetti();
  }
  confAnim = requestAnimationFrame(draw);
}
function stopConfetti() {
  if (confAnim) cancelAnimationFrame(confAnim);
  const cv = document.getElementById('confetti');
  cv.classList.remove('show');
  cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
}
window.addEventListener('resize', () => {
  const cv = document.getElementById('confetti'); cv.width=innerWidth; cv.height=innerHeight;
});

// ── 按鈕漣漪 ────────────────────────────────
document.addEventListener('click', e => {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  const r = document.createElement('span'); r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const sz = Math.max(rect.width,rect.height)*2;
  r.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
  btn.appendChild(r); r.addEventListener('animationend',()=>r.remove());
});

// ── 初始化 ──────────────────────────────────
buildNumGrid();
buildPickGrid();
pool = shuffle([...Array(TOTAL)].map((_,i)=>i+1));
document.getElementById('roundBadge').textContent = `第 ${roundNo} 期`;
document.getElementById('pickRound').textContent   = `第 ${roundNo} 期 ▪ 甲組`;
</script>
